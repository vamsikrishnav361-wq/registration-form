<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration.html</title>
    <h1>Registration Form</h1>
</head>
<body>
    

    
    <form>
        <label for="username">user name:</label><br>
        <input type="text" placeholder="Enter your username" required> <br>
        <label>email:</label><br>
        <input type="email" placeholder="Enter your email" required> <br>
        <label>password:</label><br>
        <input type="password" placeholder="Enter your password" min="6" max="10" required> <br>  
        <label>confirm password:</label><br>
        <input type="password" placeholder="Confirm your password" min="6" max="10" required> <br>
        <label> gender </label><br>
        <input type="radio" id="male" name="gender" value="male">male
        <input type="radio" id="female" name="gender" value="female">female
        <input type="radio" id="other" name="gender" value="other">other <br>
        <label>date of birth:</label><br>
        <input type="date" required> <br>
        <label> country </label> <br>
        <select required>
            <option value="">sri lanka</option>
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
            <option value="uk">United Kingdom</option>
            <option value="india"> india</option>
        </select> <br>
        <label> mobile number:</label> <br>
        <input type ="tel" placeholder="enter mobile number" pattern="[0-9]{10}" required> <br> <br>
         <input type="submit" value="submit">
         <p>already have an account? <a href="login.html">login</a></p>

        
    </form>
</body>
</html>
